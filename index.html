<!DOCTYPE html>
<!-- Created: 2026-06-23 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>터미널 보드</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="터미널 보드">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: #000; color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  #app { display: flex; height: 100%; width: 100%; }

  /* ===== 왼쪽 보드 ===== */
  #board { flex: 1; min-width: 0; min-height: 0; padding: 6px; display: flex; }
  #board > * { flex: 1 1 0; min-width: 0; min-height: 0; }
  .node { display: flex; gap: 6px; width: 100%; height: 100%; }
  .node.row { flex-direction: row; }
  .node.col { flex-direction: column; }
  .node > * { flex: 1 1 0; min-width: 0; min-height: 0; }

  .pane {
    position: relative;
    background: #0b0b0b;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 8px; overflow: hidden;
    touch-action: none;
    transition: border-color .12s, background .12s;
  }
  .pane.empty { border-style: dashed; border-color: #333; }
  .pane.drop-target { border-color: #4da3ff; background: #11202e; }
  .pane.dragging { opacity: .35; }
  .pane-body { display: flex; flex-direction: column; gap: 4px; align-items: center; max-width: 100%; }
  .pane-title {
    font-size: 14px; font-weight: 600; color: #d8e6ff;
    text-align: center; word-break: break-word;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
  }
  .pane-memo {
    font-size: 11px; color: #8a8a8a; text-align: center;
    white-space: pre-wrap; word-break: break-word;
    display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
  }
  .pane-empty-hint { font-size: 12px; color: #555; }
  .pane-dot { position: absolute; top: 6px; left: 8px; font-size: 10px; color: #444; }
  .pane-clawd {
    position: absolute; z-index: 1;
    image-rendering: pixelated;
    pointer-events: auto; cursor: pointer;
    -webkit-user-drag: none; user-select: none;
  }
  .pane-clawd.floor {
    left: 50%; bottom: 0; transform: translateX(-50%);
    width: 64px; height: 64px;
    object-fit: contain; object-position: center bottom;
  }
  .pane-clawd.wall-right {
    right: -1px; bottom: 8px;
    width: 56px; height: 56px;
    object-fit: contain; object-position: right bottom;
  }

  /* ===== 오른쪽 사이드바 ===== */
  #sidebar {
    width: 22%; min-width: 170px; max-width: 280px;
    background: #070707; border-left: 1px solid #222;
    display: flex; flex-direction: column;
    transition: background .12s, box-shadow .12s;
  }
  #sidebar.drop-target-sb { background: #11202e; box-shadow: inset 0 0 0 2px #4da3ff; }
  body.sidebar-hidden #sidebar { display: none; }
  #sidebar-head {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 8px 8px 0; flex: 0 0 auto;
  }
  #hide-btn, #show-btn {
    width: 34px; height: 34px; border-radius: 8px;
    background: #1d1d1d; border: 1px solid #333; color: #aaa;
    font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  #hide-btn:active, #show-btn:active { filter: brightness(1.4); }
  #show-btn {
    display: none; position: fixed; top: 8px; right: 8px; z-index: 800;
  }
  body.sidebar-hidden #show-btn { display: flex; }
  #add-btn {
    display: none;
    margin: 8px; padding: 10px; flex: 0 0 auto;
    background: #1a2b3d; color: #cfe4ff; border: 1px solid #2f4a66;
    border-radius: 8px; font-size: 15px; font-weight: 600;
  }
  #add-btn:active { background: #244463; }
  #todo-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; -webkit-overflow-scrolling: touch; }
  .todo-row { position: relative; margin-bottom: 8px; border-radius: 8px; overflow: hidden; }
  .todo-del-bg {
    position: absolute; inset: 0; border-radius: 8px;
    background: #c0392b; color: #fff; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 28px;
  }
  .todo-item {
    position: relative; z-index: 1;
    background: #121212; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 10px; touch-action: pan-y;
  }
  .todo-item.swiping { transition: none; }
  .todo-item.snap { transition: transform .2s ease; }
  .todo-item.dragging { opacity: .35; }
  .todo-item .t-title { font-size: 14px; font-weight: 600; color: #eaeaea; word-break: break-word; }
  .todo-item .t-memo {
    font-size: 11px; color: #888; margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  #empty-list { color: #444; font-size: 12px; text-align: center; padding: 20px 8px; }

  /* ===== 드래그 고스트 ===== */
  #ghost {
    position: fixed; z-index: 1000; pointer-events: none;
    background: #1b2c40; border: 1px solid #4da3ff; border-radius: 8px;
    padding: 8px 12px; font-size: 13px; font-weight: 600; color: #cfe4ff;
    max-width: 200px; box-shadow: 0 6px 20px rgba(0,0,0,.6);
    display: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ===== 모달/팝업 공통 ===== */
  #overlay {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(0,0,0,.6); display: none;
    align-items: center; justify-content: center; padding: 20px;
  }
  #overlay.show { display: flex; }
  .modal {
    position: relative;
    background: #141414; border: 1px solid #333; border-radius: 14px;
    padding: 18px; width: 100%; max-width: 420px; max-height: 90%; overflow-y: auto;
  }
  .modal-x {
    position: absolute; top: 12px; right: 12px;
    width: 30px; height: 30px; border-radius: 8px;
    background: #1d1d1d; border: 1px solid #333; color: #aaa;
    font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .modal-x:active { filter: brightness(1.4); }
  .modal h3 { font-size: 16px; margin-bottom: 12px; color: #fff; word-break: break-word; padding-right: 34px; }
  .modal .memo-view { font-size: 13px; color: #bbb; white-space: pre-wrap; margin-bottom: 14px; word-break: break-word; }
  .modal input, .modal textarea {
    width: 100%; background: #0c0c0c; color: #eee; border: 1px solid #333;
    border-radius: 8px; padding: 10px; font-size: 14px; margin-bottom: 10px;
    font-family: inherit; -webkit-user-select: text; user-select: text;
  }
  .modal textarea { min-height: 80px; resize: vertical; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  .btn {
    flex: 1 1 auto; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 600;
    border: 1px solid #333; background: #1d1d1d; color: #ddd; min-width: 90px;
  }
  .btn:active { filter: brightness(1.3); }
  .btn.primary { background: #1a3a5c; border-color: #2f6090; color: #cfe4ff; }
  .btn.green { background: #163a23; border-color: #2c6b41; color: #c6f0d2; }
  .btn.amber { background: #3d3015; border-color: #6b5524; color: #f0e2c0; }
  .btn.red { background: #3d1717; border-color: #6b2b2b; color: #f0c6c6; }
  .btn.ghost-btn { background: transparent; color: #999; }

  /* ===== 토스트 ===== */
  #toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #222; color: #eee; padding: 10px 16px; border-radius: 20px;
    font-size: 13px; z-index: 1100; opacity: 0; transition: opacity .2s; pointer-events: none;
    border: 1px solid #444; max-width: 80%; text-align: center;
  }
  #toast.show { opacity: 1; }

  /* ===== 세로 모드: 할일 관리 전용 ===== */
  #portrait-bar {
    display: none; flex: 0 0 auto;
    padding: 12px 14px 8px; color: #888; font-size: 12px; line-height: 1.5;
    border-bottom: 1px solid #1a1a1a;
  }
  #portrait-bar b { color: #cfe4ff; font-size: 14px; display: block; margin-bottom: 2px; }
  /* 세로(할일 목록) 모드 — 기기 회전 또는 전환 버튼으로 body.is-list 가 켜진다 */
  body.is-list #board { display: none; }
  body.is-list #sidebar, body.is-list.sidebar-hidden #sidebar {
    display: flex;
    width: 100%; min-width: 0; max-width: none;
    border-left: none;
    padding-top: env(safe-area-inset-top);
  }
  body.is-list #sidebar-head,
  body.is-list #show-btn,
  body.is-list.sidebar-hidden #show-btn { display: none; }
  body.is-list #portrait-bar { display: block; }
  body.is-list #add-btn { display: block; }

  /* ===== 가로/세로 전환 버튼 (오른쪽 아래) ===== */
  #orient-btn {
    position: fixed; z-index: 850;
    right: 12px; bottom: calc(12px + env(safe-area-inset-bottom));
    height: 38px; padding: 0 14px; border-radius: 19px;
    background: #1d1d1d; border: 1px solid #333; color: #ccc;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 10px rgba(0,0,0,.5);
  }
  #orient-btn:active { filter: brightness(1.4); }
  /* 모달이 열리면 떠 있는 버튼을 숨긴다 — 회전 모드에서 모달 위로 떠오르는 것 방지 */
  body.modal-open #show-btn, body.modal-open #orient-btn { display: none; }

  /* ===== 가로 강제: 세로로 든 채 화면만 90도 돌려 가로처럼 ===== */
  body.force-landscape #app {
    position: fixed;
    top: 0; left: 0;
    width: 100vh; height: 100vw;
    transform-origin: top left;
    transform: rotate(90deg) translateY(-100%);
  }
  /* 드래그 미리보기 라벨도 보드와 같은 방향으로 돌려 글자가 바로 보이게 */
  body.force-landscape #ghost { transform: rotate(90deg); }
  /* 화면만 90도 돌린 상태라 제스처 축도 뒤바뀐다. 진짜 가로처럼 할일을
     보드로 끌 수 있게 touch-action 축을 pan-y→pan-x 로 뒤집는다 */
  body.force-landscape .todo-item { touch-action: pan-x; }
</style>
</head>
<body>
  <div id="app">
    <div id="board"></div>
    <div id="sidebar">
      <div id="sidebar-head">
        <button id="hide-btn" aria-label="목록 숨기기">›</button>
      </div>
      <div id="portrait-bar"><b>할일 관리</b>보드를 분할·배치하려면 오른쪽 아래 <b style="display:inline">▦ 보드</b> 버튼을 누르세요.</div>
      <button id="add-btn">＋ 할일 추가</button>
      <div id="todo-list"></div>
    </div>
    <!-- 모달·토스트·떠있는 버튼은 #app 안에 둬야 가짜 가로 모드(회전)에서 보드와 같이 회전한다 -->
    <div id="overlay"></div>
    <div id="toast"></div>
    <button id="show-btn" aria-label="목록 보기">‹</button>
    <button id="orient-btn" aria-label="가로/세로 전환"></button>
  </div>

  <div id="ghost"></div>

<script>
"use strict";

/* ===================== 상태 ===================== */
const STORAGE_KEY = "terminalBoard";

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ===================== clawd 캐릭터 ===================== */
// 칸마다 랜덤으로 뜨고, 터치하면 다른 포즈로 바뀐다.
const CLAWD_POSES = [
  "clawd-idle.gif", "clawd-idle-reading.gif", "clawd-happy.gif", "clawd-thinking.gif",
  "clawd-typing.gif", "clawd-building.gif", "clawd-carrying.gif", "clawd-conducting.gif",
  "clawd-juggling.gif", "clawd-sweeping.gif", "clawd-debugger.gif", "clawd-error.gif",
  "clawd-sleeping.gif", "clawd-headphones-groove.gif", "clawd-notification.gif", "clawd-bubble.gif",
  "clawd-react-annoyed.gif", "clawd-react-double-jump.gif",
  "clawd-mini-idle.gif", "clawd-mini-peek.gif", "clawd-mini-crabwalk.gif",
  "clawd-mini-enter.gif", "clawd-mini-alert.gif", "clawd-mini-happy.gif"
];
// mini류는 오른쪽 벽에서 빼꼼 나오는 형태 → 오른쪽 가장자리에 붙인다. 나머지는 바닥에 세운다.
const CLAWD_WALL = new Set([
  "clawd-mini-idle.gif", "clawd-mini-peek.gif", "clawd-mini-crabwalk.gif",
  "clawd-mini-enter.gif", "clawd-mini-alert.gif", "clawd-mini-happy.gif"
]);
function clawdAnchor(file) { return CLAWD_WALL.has(file) ? "wall-right" : "floor"; }
function randomPose(except) {
  let p;
  do { p = CLAWD_POSES[Math.floor(Math.random() * CLAWD_POSES.length)]; }
  while (p === except && CLAWD_POSES.length > 1);
  return p;
}

function defaultState() {
  return {
    allTodos: {},                                  // id -> {title, memo}
    unplaced: [],                                  // 오른쪽 목록 순서 (id 배열)
    layout: { id: uid(), type: "pane", todoId: null }
  };
}

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    if (!s.allTodos || !s.layout) return defaultState();
    return s;
  } catch (e) {
    return defaultState();
  }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { toast("저장 실패: 저장공간 확인 필요"); }
}

/* ===================== 트리 헬퍼 ===================== */
function findPane(node, id) {
  if (node.type === "pane") return node.id === id ? node : null;
  return findPane(node.a, id) || findPane(node.b, id);
}
// id를 가진 노드의 부모 split 반환 (없으면 null)
function findParent(node, id, parent) {
  if (node.id === id) return parent || null;
  if (node.type === "split") return findParent(node.a, id, node) || findParent(node.b, id, node);
  return null;
}

/* ===================== 할일 조작 ===================== */
function addTodo(title, memo) {
  const id = uid();
  state.allTodos[id] = { title: title.trim(), memo: (memo || "").trim() };
  state.unplaced.unshift(id);                       // 목록 최상단
  saveState(); renderTodos();
}

function editTodo(id, title, memo) {
  if (!state.allTodos[id]) return;
  state.allTodos[id] = { title: title.trim(), memo: (memo || "").trim() };
  saveState(); renderAll();
}

// 할일 완전 삭제 (오른쪽 목록에서, 혹은 어디서든)
function deleteTodo(id) {
  removeFromUnplaced(id);
  // 배치된 pane에서도 제거
  detachTodoFromPanes(id);
  delete state.allTodos[id];
  saveState(); renderAll();
}

function removeFromUnplaced(id) {
  const i = state.unplaced.indexOf(id);
  if (i >= 0) state.unplaced.splice(i, 1);
}

function detachTodoFromPanes(id) {
  (function walk(n) {
    if (n.type === "pane") { if (n.todoId === id) n.todoId = null; }
    else { walk(n.a); walk(n.b); }
  })(state.layout);
}

// 오른쪽 할일 → pane 배치
function placeTodo(todoId, paneId) {
  const pane = findPane(state.layout, paneId);
  if (!pane) return;
  if (pane.todoId) { toast("이미 할일이 있는 칸입니다"); return; }
  removeFromUnplaced(todoId);
  pane.todoId = todoId;
  saveState(); renderAll();
}

// 완료: 할일 완전 제거 + pane 비움
function completeTodo(paneId) {
  const pane = findPane(state.layout, paneId);
  if (!pane || !pane.todoId) return;
  const id = pane.todoId;
  pane.todoId = null;
  delete state.allTodos[id];
  saveState(); renderAll();
  toast("완료 처리됨");
}

// 미루기: 할일 오른쪽 목록 복귀 + pane 비움
function postponeTodo(paneId) {
  const pane = findPane(state.layout, paneId);
  if (!pane || !pane.todoId) return;
  const id = pane.todoId;
  pane.todoId = null;
  if (!state.unplaced.includes(id)) state.unplaced.unshift(id);
  saveState(); renderAll();
  toast("오른쪽 목록으로 미뤘습니다");
}

/* ===================== 분할 / 병합 ===================== */
// dir: "row"(세로 분할=좌우) | "col"(가로 분할=위아래)
function splitPane(paneId, dir) {
  const pane = findPane(state.layout, paneId);
  if (!pane) return;
  const keep = { id: pane.id, type: "pane", todoId: pane.todoId, pose: pane.pose };
  const fresh = { id: uid(), type: "pane", todoId: null };
  // 기존 pane 객체를 split으로 변환 (참조 유지)
  pane.type = "split";
  pane.dir = dir;
  pane.a = keep;
  pane.b = fresh;
  delete pane.todoId;
  delete pane.pose;
  pane.id = uid();
  saveState(); renderAll();
}

// 두 pane이 같은 split의 형제인지
function areSiblings(idA, idB) {
  const pA = findParent(state.layout, idA);
  const pB = findParent(state.layout, idB);
  return pA && pA === pB;
}

// 형제 두 pane 병합 → 부모 split을 빈 pane으로 collapse, 두 할일은 오른쪽 복귀
function mergePanes(idA, idB) {
  const parent = findParent(state.layout, idA);
  if (!parent || parent.type !== "split") return;
  if (parent.a.id !== idB && parent.b.id !== idB) return;
  // 두 자식이 모두 pane이어야 단순 병합 (split이면 막음)
  if (parent.a.type !== "pane" || parent.b.type !== "pane") {
    toast("분할된 칸은 병합할 수 없습니다"); return;
  }
  [parent.a.todoId, parent.b.todoId].forEach(id => {
    if (id && !state.unplaced.includes(id)) state.unplaced.unshift(id);
  });
  // parent를 빈 pane으로 변환
  parent.type = "pane";
  parent.todoId = null;
  delete parent.dir; delete parent.a; delete parent.b;
  saveState(); renderAll();
  toast("병합되었습니다");
}

/* ===================== 렌더링 ===================== */
const boardEl = document.getElementById("board");
const listEl = document.getElementById("todo-list");

function renderAll() { renderBoard(); renderTodos(); }

function renderBoard() {
  boardEl.innerHTML = "";
  boardEl.appendChild(buildNode(state.layout));
}

function buildNode(node) {
  if (node.type === "pane") return buildPane(node);
  const el = document.createElement("div");
  el.className = "node " + (node.dir === "col" ? "col" : "row");
  el.appendChild(buildNode(node.a));
  el.appendChild(buildNode(node.b));
  return el;
}

function buildPane(node) {
  const el = document.createElement("div");
  el.className = "pane" + (node.todoId ? "" : " empty");
  el.dataset.paneId = node.id;
  const dot = document.createElement("div");
  dot.className = "pane-dot"; dot.textContent = "◻︎";
  el.appendChild(dot);
  if (node.todoId && state.allTodos[node.todoId]) {
    // clawd 캐릭터: 할일이 올라간 칸에만. 포즈가 없으면 랜덤 배정(새로고침해도 유지), 터치하면 교체
    if (!node.pose) { node.pose = randomPose(); saveState(); }
    const clawd = document.createElement("img");
    clawd.className = "pane-clawd " + clawdAnchor(node.pose);
    clawd.src = "assets/clawd/" + node.pose;
    clawd.alt = "clawd";
    clawd.draggable = false;
    el.appendChild(clawd);
    const todo = state.allTodos[node.todoId];
    const body = document.createElement("div");
    body.className = "pane-body";
    const t = document.createElement("div");
    t.className = "pane-title";
    t.textContent = todo.title || "(제목 없음)";
    body.appendChild(t);
    if (todo.memo) {
      const m = document.createElement("div");
      m.className = "pane-memo";
      m.textContent = todo.memo;
      body.appendChild(m);
    }
    el.appendChild(body);
  } else {
    const h = document.createElement("div");
    h.className = "pane-empty-hint";
    h.textContent = "탭하여 분할 / 할일 드롭";
    el.appendChild(h);
  }
  return el;
}

// clawd 터치 → 현재와 다른 랜덤 포즈로 교체 (전체 재렌더 없이 이미지만 갱신)
function cyclePose(paneEl, imgEl) {
  const node = findPane(state.layout, paneEl.dataset.paneId);
  if (!node) return;
  const next = randomPose(node.pose);
  node.pose = next;
  saveState();
  imgEl.src = "assets/clawd/" + next;
  imgEl.className = "pane-clawd " + clawdAnchor(next);
}

function renderTodos() {
  openSwipe = null;
  listEl.innerHTML = "";
  if (state.unplaced.length === 0) {
    const e = document.createElement("div");
    e.id = "empty-list";
    e.textContent = "할일이 없습니다.\n＋로 추가하세요.";
    e.style.whiteSpace = "pre-line";
    listEl.appendChild(e);
    return;
  }
  state.unplaced.forEach(id => {
    const todo = state.allTodos[id];
    if (!todo) return;
    const row = document.createElement("div");
    row.className = "todo-row";
    const bg = document.createElement("div");
    bg.className = "todo-del-bg";
    bg.dataset.delId = id;
    bg.textContent = "삭제";
    row.appendChild(bg);
    const el = document.createElement("div");
    el.className = "todo-item";
    el.dataset.todoId = id;
    const t = document.createElement("div");
    t.className = "t-title"; t.textContent = todo.title || "(제목 없음)";
    el.appendChild(t);
    if (todo.memo) {
      const m = document.createElement("div");
      m.className = "t-memo"; m.textContent = todo.memo;
      el.appendChild(m);
    }
    row.appendChild(el);
    listEl.appendChild(row);
  });
}

/* ===================== 모달 / 토스트 ===================== */
const overlay = document.getElementById("overlay");

let modalOpenedAt = 0;
function openModal(html, opts) {
  const x = (opts && opts.noX) ? "" : '<button class="modal-x" id="modal-x" aria-label="닫기">✕</button>';
  overlay.innerHTML = '<div class="modal">' + x + html + "</div>";
  overlay.classList.add("show");
  document.body.classList.add("modal-open");
  // 모달을 연 탭의 합성(synthesized) click이 배경에 떨어져 곧바로 닫는 것을 막는다(삼성 브라우저)
  modalOpenedAt = performance.now();
  const xb = document.getElementById("modal-x");
  if (xb) xb.onclick = closeModal;
}
function closeModal() {
  overlay.classList.remove("show");
  overlay.innerHTML = "";
  document.body.classList.remove("modal-open");
}
overlay.addEventListener("click", e => {
  // 모달이 막 열린 직후의 합성 click은 무시(뜨자마자 닫히는 버그 방지)
  if (performance.now() - modalOpenedAt < 400) return;
  if (e.target === overlay) closeModal();
});

let toastTimer = null;
const toastEl = document.getElementById("toast");
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 1600);
}

function esc(s) {
  return (s || "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ----- 할일 추가 모달 ----- */
function openAddTodo() {
  openModal(
    "<h3>할일 추가</h3>" +
    '<input id="m-title" placeholder="제목" autocomplete="off">' +
    '<textarea id="m-memo" placeholder="메모 (선택)"></textarea>' +
    '<div class="btn-row">' +
      '<button class="btn ghost-btn" id="m-cancel">취소</button>' +
      '<button class="btn primary" id="m-save">추가</button>' +
    "</div>"
  );
  document.getElementById("m-title").focus();
  document.getElementById("m-cancel").onclick = closeModal;
  document.getElementById("m-save").onclick = () => {
    const title = document.getElementById("m-title").value;
    if (!title.trim()) { toast("제목을 입력하세요"); return; }
    addTodo(title, document.getElementById("m-memo").value);
    closeModal();
  };
}

/* ----- 할일 상세/편집 모달 (오른쪽 목록 탭) ----- */
function openTodoDetail(id) {
  const todo = state.allTodos[id];
  if (!todo) return;
  openModal(
    "<h3>할일 보기</h3>" +
    '<input id="m-title" value="' + esc(todo.title) + '">' +
    '<textarea id="m-memo" placeholder="메모 (선택)">' + esc(todo.memo) + "</textarea>" +
    '<div class="btn-row">' +
      '<button class="btn red" id="m-del">삭제</button>' +
      '<button class="btn ghost-btn" id="m-cancel">닫기</button>' +
      '<button class="btn primary" id="m-save">저장</button>' +
    "</div>",
    { noX: true }
  );
  document.getElementById("m-cancel").onclick = closeModal;
  document.getElementById("m-save").onclick = () => {
    const title = document.getElementById("m-title").value;
    if (!title.trim()) { toast("제목을 입력하세요"); return; }
    editTodo(id, title, document.getElementById("m-memo").value);
    closeModal();
  };
  document.getElementById("m-del").onclick = () => {
    deleteTodo(id); closeModal();
  };
}

/* ----- pane 탭 팝업 ----- */
function openPanePopup(paneId) {
  const pane = findPane(state.layout, paneId);
  if (!pane) return;
  let html = "<h3>칸 작업</h3>";
  if (pane.todoId && state.allTodos[pane.todoId]) {
    const t = state.allTodos[pane.todoId];
    html += '<input id="p-title" value="' + esc(t.title) + '">';
    html += '<textarea id="p-memo" placeholder="메모 (선택)">' + esc(t.memo) + "</textarea>";
    html += '<div class="btn-row">' +
              '<button class="btn green" id="p-done">완료</button>' +
              '<button class="btn amber" id="p-postpone">미루기</button>' +
              '<button class="btn primary" id="p-save">메모 저장</button>' +
            "</div>";
  } else {
    html += '<div class="memo-view">빈 칸입니다. 분할하거나 오른쪽 할일을 드래그해 배치하세요.</div>';
  }
  html += '<div class="btn-row" style="margin-top:14px;border-top:1px solid #2a2a2a;padding-top:14px;">' +
            '<button class="btn primary" id="p-split-col">⬍ 가로 분할</button>' +
            '<button class="btn primary" id="p-split-row">⬌ 세로 분할</button>' +
          "</div>";
  openModal(html);

  document.getElementById("p-split-col").onclick = () => { splitPane(paneId, "col"); closeModal(); };
  document.getElementById("p-split-row").onclick = () => { splitPane(paneId, "row"); closeModal(); };
  if (pane.todoId) {
    document.getElementById("p-done").onclick = () => openCompleteConfirm(paneId);
    document.getElementById("p-postpone").onclick = () => { postponeTodo(paneId); closeModal(); };
    document.getElementById("p-save").onclick = () => {
      const title = document.getElementById("p-title").value;
      if (!title.trim()) { toast("제목을 입력하세요"); return; }
      editTodo(pane.todoId, title, document.getElementById("p-memo").value);
      closeModal();
    };
  }
}

/* ----- 완료 confirm ----- */
function openCompleteConfirm(paneId) {
  openModal(
    "<h3>완료 처리할까요?</h3>" +
    '<div class="memo-view">완료하면 이 할일이 목록에서 완전히 삭제됩니다.</div>' +
    '<div class="btn-row">' +
      '<button class="btn ghost-btn" id="cp-cancel">취소</button>' +
      '<button class="btn green" id="cp-ok">완료</button>' +
    "</div>"
  );
  document.getElementById("cp-cancel").onclick = () => openPanePopup(paneId);
  document.getElementById("cp-ok").onclick = () => { completeTodo(paneId); closeModal(); };
}

/* ----- 병합 confirm ----- */
function openMergeConfirm(idA, idB) {
  openModal(
    "<h3>두 칸을 병합할까요?</h3>" +
    '<div class="memo-view">두 칸이 하나로 합쳐지고, 배치된 할일은 오른쪽 목록으로 돌아갑니다.</div>' +
    '<div class="btn-row">' +
      '<button class="btn ghost-btn" id="mg-cancel">취소</button>' +
      '<button class="btn red" id="mg-ok">병합</button>' +
    "</div>"
  );
  document.getElementById("mg-cancel").onclick = closeModal;
  document.getElementById("mg-ok").onclick = () => { mergePanes(idA, idB); closeModal(); };
}

/* ===================== 드래그 / 탭 (Pointer Events) ===================== */
const ghost = document.getElementById("ghost");
const DRAG_THRESHOLD = 8;

let drag = null; // {kind:'todo'|'pane', id, startX, startY, moved, lastTarget, mode, startTx, curTx}
let openSwipe = null; // 현재 열려있는(쓰레기통 노출) 할일 {id, el, tx}

// 스와이프 종료 처리: 끝까지 밀면 삭제, 살짝 밀면 쓰레기통 노출 고정, 그 외 원위치
function finishSwipe(d) {
  const el = d.el;
  const w = el.offsetWidth || 240;
  const tx = d.curTx || 0;            // 왼쪽으로 밀면 음수
  const mag = -tx;                    // 왼쪽 이동량(양수)
  const DEL = Math.min(w * 0.5, 160); // 삭제 임계
  const PEEK = 72;                    // 삭제 버튼 노출 폭
  el.classList.remove("swiping");
  el.classList.add("snap");
  if (mag >= DEL) {
    el.style.transform = "translateX(" + (-w) + "px)";
    openSwipe = null;
    const id = d.id;
    setTimeout(() => deleteTodo(id), 180);
  } else if (mag >= 36) {
    el.style.transform = "translateX(" + (-PEEK) + "px)";
    openSwipe = { id: d.id, el: el, tx: -PEEK };
  } else {
    el.style.transform = "translateX(0)";
    if (openSwipe && openSwipe.id === d.id) openSwipe = null;
  }
}

function closeSwipe() {
  if (!openSwipe) return;
  const el = openSwipe.el;
  el.classList.remove("swiping");
  el.classList.add("snap");
  el.style.transform = "translateX(0)";
  openSwipe = null;
}

// 세로(할일 관리 전용) 모드 여부 — 현재 적용 중인 뷰 모드와 동일
function isPortrait() { return isListMode(); }

document.getElementById("add-btn").addEventListener("click", openAddTodo);

document.addEventListener("pointerdown", e => {
  if (overlay.classList.contains("show")) return;
  // 노출된 삭제 버튼 탭 → 삭제
  const delBg = e.target.closest(".todo-del-bg");
  if (delBg) {
    if (openSwipe && openSwipe.id === delBg.dataset.delId) {
      const id = openSwipe.id; openSwipe = null; deleteTodo(id);
    }
    return;
  }
  // 삭제 버튼이 열린 상태에서 그 항목 바깥을 누르면 → 닫기만 하고 탭 소비(메모장 동작)
  if (openSwipe) {
    const ti = e.target.closest(".todo-item");
    if (!ti || ti.dataset.todoId !== openSwipe.id) { closeSwipe(); return; }
  }
  const todoItem = e.target.closest(".todo-item");
  const paneItem = e.target.closest(".pane");
  if (todoItem) {
    const id = todoItem.dataset.todoId;
    const startTx = (openSwipe && openSwipe.id === id) ? openSwipe.tx : 0;
    drag = { kind: "todo", id: id, el: todoItem,
             startX: e.clientX, startY: e.clientY, moved: false, lastTarget: null,
             mode: null, startTx: startTx, curTx: startTx };
  } else if (paneItem) {
    // clawd를 누르면 분할/드래그 대신 포즈만 교체
    const clawd = e.target.closest(".pane-clawd");
    if (clawd) { cyclePose(paneItem, clawd); return; }
    drag = { kind: "pane", id: paneItem.dataset.paneId, el: paneItem,
             startX: e.clientX, startY: e.clientY, moved: false, lastTarget: null, mode: null };
  }
});

document.addEventListener("pointermove", e => {
  if (!drag) return;
  const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
  if (!drag.moved && Math.hypot(dx, dy) < DRAG_THRESHOLD) return;

  if (!drag.moved) {
    drag.moved = true;
    // 방향 판별: 할일을 왼쪽으로 밀면 스와이프 삭제(세로 모드 전용), 그 외엔 기존 드래그
    if (drag.kind === "todo" && isPortrait() &&
        (drag.startTx < 0 || (Math.abs(dx) >= Math.abs(dy) && dx < 0))) {
      drag.mode = "swipe";
      if (openSwipe && openSwipe.id !== drag.id) closeSwipe();
    } else {
      drag.mode = "drag";
      drag.el.classList.add("dragging");
      ghost.style.display = "block";
      ghost.textContent = drag.kind === "todo"
        ? (state.allTodos[drag.id]?.title || "할일")
        : "옆 칸=병합 / 오른쪽=목록으로";
    }
  }

  if (drag.mode === "swipe") {
    drag.el.classList.remove("snap");
    drag.el.classList.add("swiping");
    let tx = drag.startTx + dx;
    if (tx > 0) tx = 0;
    drag.curTx = tx;
    drag.el.style.transform = "translateX(" + tx + "px)";
    return;
  }

  ghost.style.left = (e.clientX + 12) + "px";
  ghost.style.top = (e.clientY + 12) + "px";

  // 사이드바(오른쪽 목록) 하이라이트 — 칸을 끌어 목록으로 뺄 때
  const onSidebar = drag.kind === "pane" && overSidebar(e.clientX, e.clientY);
  sidebarEl.classList.toggle("drop-target-sb", onSidebar);

  // 칸 드롭 타깃 하이라이트
  const tgt = onSidebar ? null : paneUnder(e.clientX, e.clientY);
  if (drag.lastTarget && drag.lastTarget !== tgt) drag.lastTarget.classList.remove("drop-target");
  if (tgt && tgt !== drag.el) { tgt.classList.add("drop-target"); drag.lastTarget = tgt; }
  else if (!tgt) drag.lastTarget = null;
});

document.addEventListener("pointerup", e => {
  if (!drag) return;
  const d = drag; drag = null;

  if (d.mode === "swipe") { finishSwipe(d); return; }

  ghost.style.display = "none";
  d.el.classList.remove("dragging");
  sidebarEl.classList.remove("drop-target-sb");
  if (d.lastTarget) d.lastTarget.classList.remove("drop-target");

  if (!d.moved) {
    // 탭 처리
    if (d.kind === "todo") {
      if (openSwipe && openSwipe.id === d.id) closeSwipe();
      else openTodoDetail(d.id);
    } else openPanePopup(d.id);
    return;
  }

  // 왼쪽 칸 → 오른쪽 목록으로 드롭: 그 칸의 할일을 목록으로 빼기
  if (d.kind === "pane" && overSidebar(e.clientX, e.clientY)) {
    const pane = findPane(state.layout, d.id);
    if (pane && pane.todoId) postponeTodo(d.id);
    else toast("빈 칸은 옮길 할일이 없습니다");
    return;
  }

  const tgtPane = paneUnder(e.clientX, e.clientY);
  if (!tgtPane) return;
  const tgtId = tgtPane.dataset.paneId;

  if (d.kind === "todo") {
    placeTodo(d.id, tgtId);
  } else { // pane → pane
    if (tgtId === d.id) return;
    if (areSiblings(d.id, tgtId)) openMergeConfirm(d.id, tgtId);
    else toast("인접한(같은 분할의) 칸끼리만 병합됩니다");
  }
});

document.addEventListener("pointercancel", () => {
  if (!drag) return;
  if (drag.mode === "swipe") { finishSwipe(drag); drag = null; return; }
  ghost.style.display = "none";
  drag.el.classList.remove("dragging");
  sidebarEl.classList.remove("drop-target-sb");
  if (drag.lastTarget) drag.lastTarget.classList.remove("drop-target");
  drag = null;
});

function paneUnder(x, y) {
  const els = document.elementsFromPoint(x, y);
  for (const el of els) {
    const p = el.closest && el.closest(".pane");
    if (p) return p;
  }
  return null;
}

const sidebarEl = document.getElementById("sidebar");
function overSidebar(x, y) {
  const els = document.elementsFromPoint(x, y);
  return els.some(el => el.closest && el.closest("#sidebar"));
}

/* ===================== 사이드바 토글 ===================== */
const SIDEBAR_KEY = "terminalBoard_sidebarHidden";
function setSidebarHidden(hidden) {
  document.body.classList.toggle("sidebar-hidden", hidden);
  try { localStorage.setItem(SIDEBAR_KEY, hidden ? "1" : "0"); } catch (e) {}
}
document.getElementById("hide-btn").addEventListener("click", () => setSidebarHidden(true));
document.getElementById("show-btn").addEventListener("click", () => setSidebarHidden(false));
setSidebarHidden(localStorage.getItem(SIDEBAR_KEY) === "1");

/* ===================== 가로/세로 전환 ===================== */
// forcedView: "auto"(기기 회전 따름) | "board"(가로 강제) | "list"(세로 강제)
let forcedView = "auto";

// 기기 회전만으로 판단했을 때 세로(목록) 모드인지
function autoIsList() {
  return window.matchMedia("(orientation: portrait) and (max-width: 820px)").matches;
}
// 강제 설정이 우선, 없으면 기기 회전을 따른다
function isListMode() {
  if (forcedView === "list") return true;
  if (forcedView === "board") return false;
  return autoIsList();
}
const orientBtn = document.getElementById("orient-btn");
const appEl = document.getElementById("app");
function applyView() {
  const list = isListMode();
  // 보드(가로)로 가면 세로에서 열어둔 삭제 버튼을 닫는다 — 가로에선 스와이프 삭제 비활성
  if (!list) closeSwipe();
  document.body.classList.toggle("is-list", list);
  // 폰을 세로로 든 채 보드(가로) 모드를 강제하면 화면을 90도 돌려 가로처럼 보이게 한다
  const rotate = !list && window.matchMedia("(orientation: portrait)").matches;
  document.body.classList.toggle("force-landscape", rotate);
  // 회전 박스 크기는 CSS의 100vh/100vw(레이아웃 뷰포트) 대신 실제 보이는
  // 픽셀(innerWidth/innerHeight)로 직접 잡는다. iOS 독립앱에서는 vh/vw가
  // 실제 화면과 어긋나 회전 후 화면 밖으로 잘리기 때문이다.
  if (rotate) {
    appEl.style.width = window.innerHeight + "px";
    appEl.style.height = window.innerWidth + "px";
  } else {
    appEl.style.width = "";
    appEl.style.height = "";
  }
  // 버튼은 "전환될 방향"을 보여준다
  orientBtn.textContent = list ? "▦ 보드" : "▤ 목록";
}
orientBtn.addEventListener("click", () => {
  forcedView = isListMode() ? "board" : "list";
  applyView();
});
// 실제로 회전이 동작하는 기기에서는 회전 시 자동 모드로 복귀(물리 회전 우선)
window.matchMedia("(orientation: portrait)").addEventListener("change", () => {
  forcedView = "auto";
  applyView();
});
// 회전 직후엔 일부 모바일 브라우저(iOS Safari 등)에서 matchMedia/viewport 값이
// 아직 회전 전 값으로 남아 있어 위 change 시점의 applyView()가 잘못 판정될 수 있다.
// viewport가 실제로 정착되면 resize가 발생하므로, 자동 모드일 때 한 번 더 교정한다.
window.addEventListener("resize", () => {
  // 자동 모드 교정뿐 아니라, 회전 강제(force-landscape) 중에도 뷰포트가
  // 바뀌면 #app 픽셀 크기를 다시 맞춰야 잘림이 생기지 않는다.
  if (forcedView === "auto" || document.body.classList.contains("force-landscape")) applyView();
});
applyView();

/* ===================== 시작 ===================== */
renderAll();
</script>
